name: Generate Monthly Texts

on:
  # Every month on the 28th at 02:00 UTC.
  # The script generates all days of the FOLLOWING month.
  schedule:
    - cron: '0 2 28 * *'

  # Manual trigger — useful to test or regenerate a specific month.
  workflow_dispatch:
    inputs:
      target_month:
        description: 'Mois à générer (YYYY-MM). Laisser vide = mois suivant.'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate texts
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          TARGET_MONTH:        ${{ github.event.inputs.target_month }}
        run: node scripts/generate-texts.js
